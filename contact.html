<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contact — Dalot Beauty Spa</title>
<meta name="description" content="Contact Dalot Beauty Spa for bookings, questions, and bridal consultations.">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head><body>
<div id="site-header"></div>
<section class="page-hero"><div class="container"><h1>Get in Touch</h1><p>We would love to hear from you</p></div></section>
<section class="section"><div class="container">
  <div class="contact-info">
    <div class="info-card"><div class="icon">📞</div><strong>Call</strong><a href="tel:+19084684268">+1 908-468-4268</a></div>
    <div class="info-card"><div class="icon">💬</div><strong>WhatsApp</strong><a href="https://wa.me/19084684268" target="_blank">Chat now</a></div>
    <div class="info-card"><div class="icon">🕒</div><strong>Hours</strong>Mon–Sat 10–8 · Sun 11–6</div>
  </div>
  <form class="form" id="contact-form">
    <div class="form-group"><label>Your Name *</label><input name="name" required></div>
    <div class="form-group"><label>Email *</label><input type="email" name="email" required></div>
    <div class="form-group"><label>Phone</label><input name="phone"></div>
    <div class="form-group"><label>Message *</label><textarea name="message" rows="5" required></textarea></div>
    <button type="submit" class="btn btn-primary">Send Message</button>
  </form>
</div></section>
<div id="site-footer"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/script.js"></script>
<script>
mountChrome('contact');
document.getElementById('contact-form').addEventListener('submit',e=>{e.preventDefault();submitContact(e.target)});
</script>
</body></html>
